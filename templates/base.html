<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Hotel Maintenance Manager" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">Hotel Ops</p>
            <h1>Hotel Maintenance Manager</h1>
        </div>
        <nav class="nav">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('rooms') }}">Rooms</a>
            <a href="{{ url_for('technicians') }}">Technicians</a>
            <a href="{{ url_for('issues') }}">Issues</a>
        </nav>
    </header>

    <main class="page">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
